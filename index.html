function completeChallenge(){if(state.challengeDate===todayISO()){toast(t('completed'));return} state.challengeDate=todayISO(); state.points+=5; save(); toast(t('nice')); renderGrow()}
function harvest(){if(state.points<100)return; const icons=['🌳','🌺','🪴','🌵','🌻','🎋']; state.harvested.push(icons[state.harvested.length%icons.length]); state.points=0; save(); toast('Harvested into your garden 🌿'); renderGrow()}
function openAsk(){openSheet(t('ask'),'Mock AI · designed for plain-English finance',`<div class="stack"><div class="card press" onclick="openBrief()"><div class="assetName">What moved my portfolio today?</div><div class="assetSub">Explain like a calm analyst</div></div><div class="card press" onclick="showPage('grow');closeSheet()"><div class="assetName">What should I understand next?</div><div class="assetSub">Open today’s Grow deck</div></div><div class="card"><div class="assetName">Production note</div><p class="sub">Connect this to OpenAI/Claude, live prices, news APIs, and read-only brokerage data.</p></div></div>`)}
function openSheet(title,sub,body){$('sheetTitle').innerHTML=title;$('sheetSub').innerHTML=sub||'';$('sheetBody').innerHTML=body;$('sheetO').classList.add('active')}
function closeSheet(){$('sheetO').classList.remove('active')}
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2100)}
function renderOnboard(){document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n)); const langs=[['en','English','English'],['zh','中文','Chinese'],['es','Español','Spanish']]; $('langChoices').innerHTML=langs.map(([id,n,s])=>`<div class="choice ${state.lang===id?'on':''}" onclick="state.lang='${id}';save();renderAll();renderOnboard()"><h4>${n}</h4><p>${s}</p></div>`).join(''); const styles=['calm','direct','pro','beginner']; $('styleChoices').innerHTML=styles.map(id=>`<div class="choice ${state.style===id?'on':''}" onclick="state.style='${id}';save();renderOnboard()"><h4>${t(id)}</h4><p>${id==='calm'?'No panic, no jargon.':id==='direct'?'Fast and practical.':id==='pro'?'Institutional tone.':'Simple explanations.'}</p></div>`).join('')}
function finishOnboard(){state.onboarded=true;save();$('onboard').classList.remove('active');toast('Welcome to Luma')}
function skipOnboard(){finishOnboard()}
function openLang(){openSheet(t('language'),'',`<div class="grid3">${[['en','English'],['zh','中文'],['es','Español']].map(([id,n])=>`<div class="choice ${state.lang===id?'on':''}" onclick="state.lang='${id}';save();renderAll();closeSheet();toast('${n}')"><h4>${n}</h4></div>`).join('')}</div>`)}
function openStyle(){openSheet(t('style'),'',`<div class="stack">${['calm','direct','pro','beginner'].map(id=>`<div class="choice ${state.style===id?'on':''}" onclick="state.style='${id}';save();renderAll();closeSheet();toast('${t('style')}: ${t(id)}')"><h4>${t(id)}</h4></div>`).join('')}</div>`)}
function resetDemo(){localStorage.removeItem('lumaState');state=loadState();initDeck();renderAll();toast('Demo reset')}
init();
</script>
</body>
