{key:'mistakeAvoid',emoji:'⚠️',text:c.mistake||'',bullets:[c.habit||'',common.mist1],matter:c.habit||'',portfolio:common.mist2}]}
function openModule(id){const m=MODULES.find(x=>x.id===id);if(!m)return;const review=!!state.completed[id];if(!review&&!isLevelUnlocked(m.level)){toast(tr('locked'));return}current={id,card:0,quiz:false,q:0,score:0,earned:0,eligible:!review,review,qs:null}; renderModuleSheet()}
function renderModuleSheet(){const m=MODULES.find(x=>x.id===current.id); if(!current.quiz){const c=learningCards(m)[current.card];openSheet(moduleTitle(m),`${current.card+1}/5 · ${catLabel(m.cat)} · ${current.eligible?tr('open'):tr('review')}`,`<div class="learnCard"><div class="emoji">${c.emoji}</div><h2>${tr(c.key)}</h2><p>${c.text}</p><ul>${c.bullets.map(x=>`<li>${x}</li>`).join('')}</ul><div class="quote"><strong>${tr('whyMatters')}:</strong> ${c.matter}</div><div class="quote"><strong>${tr('portfolioExample')}:</strong> ${c.portfolio}</div></div><div class="row" style="margin-top:12px"><button class="btn dark" style="flex:1" onclick="closeSheet()">${tr('close')}</button><button class="btn" style="flex:1" onclick="nextLearn()">${current.card===4?tr('takeQuiz'):tr('nextCard')}</button></div>`)}else renderQuiz()}
function nextLearn(){if(current.card<4){current.card++;renderModuleSheet()}else{current.quiz=true;current.q=0;current.qs=quizQs(MODULES.find(x=>x.id===current.id));renderQuiz()}}
function quizQs(m){const bank=QUIZ_BANK[m.id]||{}; const raw=(bank[state.lang]||bank.en||[]); const fallback=[{q:tr('question')+' 1',choices:[moduleTitle(m),modulePlain(m),tr('reviewMode')],answer:0,e:modulePlain(m)}]; return (raw.length?raw:fallback).map(item=>{const opts=shuffle(item.choices.map((t,i)=>({t,ok:i===item.answer}))); return {q:item.q,a:opts.map(o=>o.t),c:opts.findIndex(o=>o.ok),e:item.e||item.choices[item.answer]}})}
function renderQuiz(){const m=MODULES.find(x=>x.id===current.id), qs=current.qs||quizQs(m); current.qs=qs; if(current.q>=qs.length){let bonus=0;if(current.eligible){bonus=5;state.points+=5;state.completed[m.id]=todayISO();save()}openSheet(tr('score'),moduleTitle(m),`<div class="stack"><div class="card"><div class="value">${current.score}/3</div><p class="sub">${tr('earned')}: ${current.earned+bonus}</p><p class="sub">${bonus?'🌿 '+tr('bonus'):tr('reviewMode')}</p><div class="impactRow"><span class="pill good">${tr(stage().key)}</span><span class="pill">${state.points} ${tr('points')}</span></div></div><button class="btn" onclick="closeSheet();renderGrow();toast('${tr('newModule')}')">${tr('finishModule')}</button></div>`);return}const q=qs[current.q];openSheet(tr('takeQuiz'),`${tr('score')}: ${current.score}/3`, `<div class="card"><div class="eyebrow">${tr('question')} ${current.q+1}/3</div><div class="assetName" style="font-size:18px;margin-top:8px">${q.q}</div></div><div style="margin-top:10px">${q.a.map((a,i)=>`<div class="option" onclick="answerQuiz(${i})">${a}</div>`).join('')}</div>`)}
function answerQuiz(i){const q=current.qs[current.q];if(i===q.c){current.score++;if(current.eligible){state.points+=5;current.earned+=5;save()}toast(current.eligible?tr('nice'):tr('correctReview'))}else{toast(`${tr('notQuite')} ${q.e}`)}current.q++;setTimeout(renderQuiz,520)}
function completeChallenge(){if(state.challengeDate===todayISO()){toast(tr('alreadyChallenge'));return}state.challengeDate=todayISO();state.points+=5;save();renderGrow();toast(tr('challengeDone'))}
function harvest(){if(state.points<100)return;const c=launchCopy();const type=state.plantType;const name=plantName(type);const rarity=plantRarity(type);state.harvested.push({date:todayISO(),type});state.points=0;state.plantType=nextPlantType();save();renderGrow();openSheet(c.harvestTitle,name,`<div class="harvestShowcase"><div class="harvestPlant">${plantSVG(5,type)}</div><div class="rarityPill">✦ ${rarity}</div><h3 style="margin-top:14px">${name}</h3><p class="calmCopy" style="margin-top:8px">${c.harvestSub}</p><p class="tiny" style="margin-top:10px">${c.earnedBy}</p><button class="btn" style="margin-top:16px;width:100%" onclick="closeSheet()">${tr('done')}</button></div>`)}
function openAsk(){const moved=JSON.stringify(tr('askMoved'));const risk=JSON.stringify(tr('askRisk'));const learn=JSON.stringify(tr('askLearn'));openSheet(tr('ask'),tr('askSub'),`<div class="stack"><div class="card press" onclick='openPortfolioQuestion(${moved})'><div class="assetName">${tr('askMoved')}</div><div class="assetSub">${tr('portfolioImpact')}</div></div><div class="card press" onclick='openPortfolioQuestion(${risk})'><div class="assetName">${tr('askRisk')}</div><div class="assetSub">${tr('concentration')}</div></div><div class="card press" onclick="openExposureMap()"><div class="assetName">${tr('exposureMap')}</div><div class="assetSub">${exposureCopy().sub}</div></div><div class="card press" onclick='openPortfolioQuestion(${learn})'><div class="assetName">${tr('askLearn')}</div><div class="assetSub">${tr('activeDeckCopy')}</div></div><div class="card press" onclick="openPanicMode()"><div class="assetName">${launchCopy().panicTitle}</div><div class="assetSub">${launchCopy().panicBody}</div></div><div class="card"><div class="assetName">${tr('prodVersion')}</div><p class="sub">${tr('prodBody')}</p></div></div>`)}
function openSheet(title,sub,body){$('sheetTitle').innerHTML=title;$('sheetSub').innerHTML=sub||'';$('sheetBody').innerHTML=body;$('sheetO').classList.add('active')}
function closeSheet(){$('sheetO').classList.remove('active')}
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2300)}
function previewSlides(){return [
{key:'preview1',kicker:tr('preview1Kicker'),title:tr('preview1Title'),body:tr('preview1Body'),art:`<div class="previewScene"><div class="previewParticles"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="previewArt"><div class="previewCardMini chart"><div class="miniLabel">Portfolio</div><div class="miniValue">+2.8%</div><div class="sparkLine"><span></span><span></span><span></span><span></span><span></span></div></div><div class="previewCardMini side"><div class="miniLabel">Drivers</div><div class="previewDotGrid"><span></span><span></span><span></span><span></span></div></div></div></div>`},
{key:'preview2',kicker:tr('preview2Kicker'),title:tr('preview2Title'),body:tr('preview2Body'),art:`<div class="previewScene"><div class="previewParticles"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="previewArt"><div class="previewPlantLarge">${plantSVG(4,state.plantType)}</div></div></div>`},
{key:'preview3',kicker:tr('preview3Kicker'),title:tr('preview3Title'),body:tr('preview3Body'),art:`<div class="previewScene"><div class="previewParticles"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div><div class="previewArt"><div class="chatMock"><div class="chatBubble user">Why is my portfolio up today?</div><div class="chatBubble bot">Technology and energy are helping most, while rates are the main offset.</div><div class="chatBubble bot">You can also ask about risk, exposure, or what to learn next.</div></div></div></div>`}
]}
function renderPreviewStage(){const slides=previewSlides();const slide=slides[state.previewPage]||slides[0];return `<div class="previewWrap"><div class="previewFooterRow"><div class="previewStepLabel">${tr('previewStep')} ${state.previewPage+1}/3</div><div class="previewDots">${slides.map((_,i)=>`<span class="${i===state.previewPage?'on':''}"></span>`).join('')}</div></div><div class="previewStage"><div class="previewHero">${slide.art}</div><div class="previewText"><div class="previewKicker">${slide.kicker}</div><div class="previewTitle">${slide.title}</div><div class="previewBody">${slide.body}</div><div class="previewChipRow"><div class="previewChip">${launchCopy().trackTitle}</div><div class="previewChip">${launchCopy().growTitle}</div><div class="previewChip">${launchCopy().askTitle}</div></div></div></div></div>`}
function renderStyleStage(){return `<div class="sectionTitle" style="margin:18px 0 8px">${tr('chooseStyle')}</div><div class="stack">${['calm','direct','pro','beginner'].map(id=>`<div class="choice ${state.style===id?'on':''}" onclick="state.style='${id}';save();renderOnboard()"><h4>${tr(id)}</h4><p>${tr(id+'Desc')}</p></div>`).join('')}</div>`}
function renderLanguageStage(){return `<div class="sectionTitle" style="margin:18px 0 8px">${tr('chooseLanguage')}</div><div class="grid3">${[['en','English'],['zh','中文'],['es','Español']].map(([id,n])=>`<div class="choice ${state.lang===id?'on':''}" onclick="state.lang='${id}';state.onboardStep=1;state.previewPage=0;save();renderAll()"><h4>${n}</h4></div>`).join('')}</div>`}
function renderOnboard(){const step=state.onboardStep||0;$('skipBtn').textContent=tr('skip');if(step===0){$('onTitle').textContent=tr('onboardTitle');$('onSub').textContent=tr('onboardSub');$('onStage').innerHTML=renderLanguageStage();$('finishBtn').textContent=tr('previewTry')}else if(step===1){$('onTitle').textContent=tr('previewTry');$('onSub').textContent=tr('heroSub');$('onStage').innerHTML=renderPreviewStage();$('finishBtn').textContent=state.previewPage===2?tr('previewContinue'):tr('previewNext')}else{$('onTitle').textContent=tr('styleStep');$('onSub').textContent=tr('askSub');$('onStage').innerHTML=renderStyleStage();$('finishBtn').textContent=tr('finishSetup')}}
function onboardPrimary(){const step=state.onboardStep||0;if(step===0){state.onboardStep=1;save();renderOnboard();return}if(step===1){if((state.previewPage||0)<2){state.previewPage=(state.previewPage||0)+1;save();renderOnboard()}else{state.onboardStep=2;save();renderOnboard()}return}finishOnboard()}
function finishOnboard(){state.onboarded=true;state.onboardStep=0;state.previewPage=0;save();$('onboard').classList.remove('active');toast(tr('welcome'))}
function skipOnboard(){finishOnboard()}
function openLang(){openSheet(tr('language'),'',`<div class="grid3">${[['en','English'],['zh','中文'],['es','Español']].map(([id,n])=>`<div class="choice ${state.lang===id?'on':''}" onclick="state.lang='${id}';save();closeSheet();renderAll();toast('${tr('langSet')}')"><h4>${n}</h4></div>`).join('')}</div>`)}
function openStyle(){openSheet(tr('aiStyle'),'',`<div class="stack">${['calm','direct','pro','beginner'].map(id=>`<div class="choice ${state.style===id?'on':''}" onclick="state.style='${id}';save();closeSheet();renderAll();toast('${tr('styleSet')}')"><h4>${tr(id)}</h4><p>${tr(id+'Desc')}</p></div>`).join('')}</div>`)}
function resetDemo(){localStorage.removeItem('fluxStateV14');state=defaultState();initQueue();renderAll();toast(tr('demoReset'))}
function init(){initQueue();renderAll();if(!state.onboarded)$('onboard').classList.add('active')}
init();
</script>
</body>
</html>
