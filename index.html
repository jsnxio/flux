const MODULES=[{"id": "stock", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "🌱", "title": {"en": "What is a stock?", "zh": "什么是股票？", "es": "¿Qué es una acción?"}, "plain": {"en": "a small ownership stake in a company", "zh": "一家公司的部分所有权", "es": "una pequeña participación de propiedad en una empresa"}, "content": {"en": {"what": "A stock represents ownership in a company. If the company grows and earns more over time, shareholders may benefit.", "why": "Investors care because stock prices reflect expectations for growth, profits, and risk.", "example": "If Apple reports stronger iPhone sales than expected, the stock may rise because investors revise future profit expectations upward.", "portfolio": "Owning a few individual stocks can boost returns, but concentration risk rises if one company becomes too large in your portfolio.", "mistake": "A common mistake is treating a stock like a lottery ticket instead of part of a long-term ownership plan.", "habit": "Before buying a stock, ask what the business does, how it makes money, and how large the position should be."}, "zh": {"what": "股票代表对一家公司的所有权。公司长期发展得越好、赚得越多，股东通常越有机会受益。", "why": "投资者关心股票，因为股价反映了市场对增长、盈利和风险的预期。", "example": "如果苹果的 iPhone 销量好于预期，股价可能上涨，因为市场会上调对未来利润的预期。", "portfolio": "持有少量个股可能提高收益，但如果某一家公司占比过大，组合集中风险也会明显上升。", "mistake": "常见错误是把股票当成彩票，而不是长期持有企业的一部分。", "habit": "买入股票前，先问清楚这家公司做什么、怎么赚钱，以及这笔仓位应该有多大。"}, "es": {"what": "Una acción representa propiedad en una empresa. Si la empresa crece y gana más con el tiempo, los accionistas pueden beneficiarse.", "why": "A los inversores les importa porque el precio de una acción refleja expectativas de crecimiento, ganancias y riesgo.", "example": "Si Apple reporta ventas de iPhone mejores de lo esperado, la acción puede subir porque el mercado eleva sus expectativas de beneficios futuros.", "portfolio": "Tener unas pocas acciones individuales puede aumentar el retorno, pero también eleva el riesgo de concentración si una empresa pesa demasiado.", "mistake": "Un error común es tratar una acción como un billete de lotería en lugar de parte de un plan de propiedad a largo plazo.", "habit": "Antes de comprar una acción, pregunta qué hace el negocio, cómo gana dinero y qué tamaño debería tener la posición."}}}, {"id": "etf", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "🧺", "title": {"en": "What is an ETF?", "zh": "什么是 ETF？", "es": "¿Qué es un ETF?"}, "plain": {"en": "a basket of investments that trades like one stock", "zh": "像一只股票一样交易的一篮子资产", "es": "una cesta de inversiones que cotiza como una sola acción"}, "content": {"en": {"what": "An ETF bundles many securities into one fund that trades on an exchange. It gives you diversification in a single purchase.", "why": "Investors care because ETFs are often a simple, low-cost way to build broad market exposure.", "example": "Buying VTI gives exposure to a broad slice of the U.S. stock market instead of relying on one company.", "portfolio": "ETFs can be the core of a portfolio because they reduce single-stock risk and are easy to rebalance.", "mistake": "A common mistake is assuming every ETF is automatically safe; some are very concentrated or highly specialized.", "habit": "Check what the ETF actually holds, its fee, and whether it fits the role you want it to play in your portfolio."}, "zh": {"what": "ETF 会把很多证券打包成一个在交易所买卖的基金，让你一次买入就获得分散配置。", "why": "投资者关心 ETF，因为它通常是建立广泛市场敞口的简单、低成本工具。", "example": "买入 VTI，就能配置美国股市的大范围股票，而不是只押注一家公司。", "portfolio": "ETF 很适合作为组合核心，因为它能降低个股风险，也便于再平衡。", "mistake": "常见错误是以为所有 ETF 都天然安全；有些 ETF 非常集中，或只押注很窄的主题。", "habit": "先看 ETF 到底持有什么、费用是多少，以及它是否符合你在组合中的定位。"}, "es": {"what": "Un ETF agrupa muchos valores en un fondo que cotiza en bolsa. Te da diversificación con una sola compra.", "why": "Importa porque los ETF suelen ser una forma simple y de bajo costo de obtener exposición amplia al mercado.", "example": "Comprar VTI te da exposición a una gran parte del mercado bursátil de EE. UU. en vez de depender de una sola empresa.", "portfolio": "Los ETF pueden ser el núcleo de una cartera porque reducen el riesgo de una sola acción y son fáciles de rebalancear.", "mistake": "Un error común es creer que todo ETF es automáticamente seguro; algunos son muy concentrados o muy temáticos.", "habit": "Revisa qué tiene realmente el ETF, cuánto cobra y si encaja con el papel que quieres darle en tu cartera."}}}, {"id": "bond", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "🏛", "title": {"en": "What is a bond?", "zh": "什么是债券？", "es": "¿Qué es un bono?"}, "plain": {"en": "a loan investors make to a company or government", "zh": "投资者借给公司或政府的一笔钱", "es": "un préstamo que los inversores hacen a una empresa o a un gobierno"}, "content": {"en": {"what": "A bond is a loan. You lend money to a government or company, and in return you usually receive interest plus principal at maturity.", "why": "Investors care because bonds can provide income, stability, and a reference point for interest rates across markets.", "example": "When Treasury yields rise, existing bond prices often fall because new bonds offer more attractive income.", "portfolio": "Bonds can help balance a portfolio that otherwise swings heavily with stocks.", "mistake": "A common mistake is thinking bonds cannot lose value. Prices can move a lot when rates or credit risk change.", "habit": "Look at both yield and risk: who issued the bond, how long it matures, and how it fits your need for income or stability."}, "zh": {"what": "债券本质上是一笔贷款。你把钱借给政府或公司，通常会定期收到利息，并在到期时拿回本金。", "why": "投资者关注债券，因为它能提供收益、稳定性，也会影响整个市场的利率定价。", "example": "当美国国债收益率上升时，旧债价格通常会下跌，因为新债能提供更有吸引力的收益。", "portfolio": "如果组合里股票波动较大，债券能起到一定的平衡作用。", "mistake": "常见错误是以为债券不会亏钱。其实利率或信用风险变化时，债券价格也会明显波动。", "habit": "看债券时要同时看收益和风险：谁发行的、多久到期，以及它是否符合你对收入或稳定性的需求。"}, "es": {"what": "Un bono es un préstamo. Prestas dinero a un gobierno o empresa y normalmente recibes intereses más el principal al vencimiento.", "why": "Importa porque los bonos pueden ofrecer ingresos, estabilidad y sirven como referencia para las tasas en todo el mercado.", "example": "Cuando suben los rendimientos de los bonos del Tesoro, los precios de los bonos existentes suelen caer porque los nuevos ofrecen más ingreso.", "portfolio": "Los bonos pueden ayudar a equilibrar una cartera que de otro modo se movería demasiado con las acciones.", "mistake": "Un error común es pensar que los bonos no pueden perder valor. Sus precios pueden moverse mucho cuando cambian las tasas o el riesgo crediticio.", "habit": "Mira tanto rendimiento como riesgo: quién emite el bono, cuánto dura y si encaja con tu necesidad de ingreso o estabilidad."}}}, {"id": "marketcap", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "🏷", "title": {"en": "What is market cap?", "zh": "什么是市值？", "es": "¿Qué es la capitalización bursátil?"}, "plain": {"en": "the total market value of a company’s equity", "zh": "一家公司的总股权市场价值", "es": "el valor total de mercado del capital de una empresa"}, "content": {"en": {"what": "Market cap is a company’s share price multiplied by its total shares outstanding. It tells you how large the market currently values the company.", "why": "Investors care because company size often affects growth expectations, stability, and how a stock behaves in different market environments.", "example": "A mega-cap like Microsoft usually trades differently from a small-cap firm because investors expect different levels of growth and risk.", "portfolio": "Market cap helps you see whether your portfolio leans toward large, established firms or smaller, more volatile companies.", "mistake": "A common mistake is assuming a higher market cap automatically means a stock is cheap or expensive.", "habit": "Use market cap as context, then compare it with growth, profitability, and valuation."}, "zh": {"what": "市值等于股价乘以总流通股数，它反映市场目前给这家公司定出的整体价值。", "why": "投资者关心市值，因为公司规模往往会影响成长性、稳定性，以及股票在不同市场环境中的表现。", "example": "像微软这样的超大市值公司，交易特征通常会和小盘股不同，因为市场对它们的成长和风险预期不一样。", "portfolio": "看市值能帮助你判断，自己的组合更偏向大而稳的公司，还是偏向波动更大的小公司。", "mistake": "常见错误是把“市值大”直接等同于“便宜”或“贵”。", "habit": "把市值当作背景信息，再结合增长、盈利和估值一起看。"}, "es": {"what": "La capitalización bursátil es el precio de la acción multiplicado por las acciones en circulación. Indica cuánto valora el mercado a la empresa.", "why": "Importa porque el tamaño de una empresa suele afectar sus expectativas de crecimiento, su estabilidad y su comportamiento en el mercado.", "example": "Una mega-cap como Microsoft suele comportarse distinto a una small-cap porque el mercado espera niveles diferentes de crecimiento y riesgo.", "portfolio": "La capitalización te ayuda a ver si tu cartera se inclina hacia empresas grandes y estables o hacia compañías más pequeñas y volátiles.", "mistake": "Un error común es asumir que una mayor capitalización hace que una acción sea automáticamente barata o cara.", "habit": "Usa la capitalización como contexto y luego compárala con crecimiento, rentabilidad y valoración."}}}, {"id": "pe", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "🔎", "title": {"en": "What is P/E ratio?", "zh": "什么是市盈率（P/E）？", "es": "¿Qué es el ratio P/E?"}, "plain": {"en": "price divided by earnings per share", "zh": "股价除以每股收益", "es": "el precio dividido por la ganancia por acción"}, "content": {"en": {"what": "The P/E ratio compares a company’s share price with its earnings per share. It is one common shortcut for valuation.", "why": "Investors care because P/E helps show how much the market is willing to pay for a dollar of earnings.", "example": "A fast-growing software company may trade at a higher P/E than a mature utility because investors expect more future growth.", "portfolio": "P/E can help you compare holdings, but it works best when you compare similar businesses or sectors.", "mistake": "A common mistake is using P/E alone and ignoring debt, cash flow, or growth quality.", "habit": "Use P/E as a starting point, not a final answer. Always ask why the multiple is high or low."}, "zh": {"what": "市盈率把股价和每股收益放在一起比较，是最常见的估值指标之一。", "why": "投资者关心市盈率，因为它能反映市场愿意为一单位利润支付多少价格。", "example": "高速增长的软件公司往往比成熟公用事业公司拥有更高的市盈率，因为市场预期其未来增长更快。", "portfolio": "市盈率可以帮助比较持仓，但最好是在相近行业或相似商业模式之间比较。", "mistake": "常见错误是只看市盈率，而忽略负债、现金流或增长质量。", "habit": "把市盈率当作起点，而不是最终答案；要继续问，为什么这个估值高或低。"}, "es": {"what": "El ratio P/E compara el precio de la acción con la ganancia por acción. Es un atajo común para valorar una empresa.", "why": "Importa porque el P/E muestra cuánto está dispuesto a pagar el mercado por cada dólar de ganancias.", "example": "Una empresa de software de rápido crecimiento puede cotizar a un P/E más alto que una utility madura porque se espera más crecimiento futuro.", "portfolio": "El P/E puede ayudarte a comparar posiciones, pero funciona mejor entre negocios o sectores parecidos.", "mistake": "Un error común es usar solo el P/E e ignorar deuda, flujo de caja o calidad del crecimiento.", "habit": "Usa el P/E como punto de partida, no como respuesta final. Siempre pregunta por qué el múltiplo es alto o bajo."}}}, {"id": "rates", "level": "foundation", "cat": "macroRates", "diff": "beginnerLevel", "emoji": "🏦", "title": {"en": "What are interest rates?", "zh": "什么是利率？", "es": "¿Qué son las tasas de interés?"}, "plain": {"en": "the cost of borrowing money and the return for lending it", "zh": "借钱的成本，也是放贷的回报", "es": "el costo de pedir dinero prestado y el rendimiento por prestarlo"}, "content": {"en": {"what": "Interest rates are the price of money. They affect loans, savings, bonds, and how investors value future cash flows.", "why": "Investors care because rates influence financing costs, consumer demand, and the valuation of nearly every asset class.", "example": "When mortgage rates rise, housing demand often cools because monthly payments become more expensive.", "portfolio": "Higher rates can pressure growth stocks and bonds, while some financial stocks may benefit.", "mistake": "A common mistake is thinking rate changes affect only banks. In reality, rates ripple through the whole market.", "habit": "When rates move, ask which parts of your portfolio are most sensitive to borrowing costs or long-term valuation."}, "zh": {"what": "利率就是“钱的价格”。它会影响贷款、存款、债券，以及市场如何给未来现金流定价。", "why": "投资者关注利率，因为它会影响融资成本、消费需求，以及几乎所有资产类别的估值。", "example": "当房贷利率上升时，购房需求通常会降温，因为每月还款压力更大。", "portfolio": "利率上升可能压制成长股和债券，但部分金融股反而可能受益。", "mistake": "常见错误是以为利率只影响银行；实际上，它会传导到整个市场。", "habit": "当利率变化时，先问自己的组合里，哪些资产最依赖融资成本或长期估值。"}, "es": {"what": "Las tasas de interés son el precio del dinero. Afectan préstamos, ahorro, bonos y la valoración de los flujos de caja futuros.", "why": "Importan porque influyen en el costo de financiación, la demanda del consumidor y la valoración de casi todos los activos.", "example": "Cuando suben las tasas hipotecarias, la demanda de vivienda suele enfriarse porque los pagos mensuales son más altos.", "portfolio": "Tasas más altas pueden presionar acciones de crecimiento y bonos, mientras algunas financieras pueden beneficiarse.", "mistake": "Un error común es pensar que los cambios de tasas solo afectan a los bancos. En realidad, impactan a todo el mercado.", "habit": "Cuando cambien las tasas, pregunta qué partes de tu cartera son más sensibles al costo del dinero o a la valoración de largo plazo."}}}, {"id": "ratesstocks", "level": "builder", "cat": "macroRates", "diff": "intermediateLevel", "emoji": "📉", "title": {"en": "Why do rates affect stocks?", "zh": "为什么利率会影响股票？", "es": "¿Por qué las tasas afectan a las acciones?"}, "plain": {"en": "rates change discounting, financing costs, and investor preferences", "zh": "利率会改变折现、融资成本和投资者偏好", "es": "las tasas cambian el descuento, los costos de financiación y las preferencias del inversor"}, "content": {"en": {"what": "Interest rates affect stocks because they change how investors discount future earnings and how expensive it is for companies to finance growth.", "why": "Investors care because long-duration growth stocks often react more strongly when rates rise or fall.", "example": "If Treasury yields jump, unprofitable or high-multiple tech stocks may fall faster than banks or energy names.", "portfolio": "This matters if you own names like NVDA or MSFT, which can be more valuation-sensitive than broad market ETFs.", "mistake": "A common mistake is assuming rates explain every stock move. Earnings, positioning, and sentiment still matter.", "habit": "Use rates as one lens: ask whether the stock depends more on future growth, current cash flow, or credit conditions."}, "zh": {"what": "利率会影响股票，因为它会改变投资者如何折现未来利润，也会改变企业融资扩张的成本。", "why": "投资者关心这一点，因为“久期更长”的成长股在利率升降时往往反应更剧烈。", "example": "如果国债收益率快速上升，高估值科技股或暂未盈利的公司，往往比银行或能源股跌得更快。", "portfolio": "如果你持有 NVDA、MSFT 这类股票，这一点尤其重要，因为它们通常比宽基 ETF 更受估值变化影响。", "mistake": "常见错误是把所有股价波动都归因于利率，实际上盈利、仓位和情绪也同样重要。", "habit": "把利率当作一个分析视角：先判断这只股票更依赖未来增长、当前现金流，还是信用环境。"}, "es": {"what": "Las tasas afectan a las acciones porque cambian cómo se descuentan las ganancias futuras y cuánto cuesta financiar el crecimiento.", "why": "Importa porque las acciones de crecimiento de mayor duración suelen reaccionar con más fuerza cuando suben o bajan las tasas.", "example": "Si saltan los rendimientos del Tesoro, las tecnológicas de múltiplos altos o sin beneficios pueden caer más rápido que bancos o energía.", "portfolio": "Esto importa si tienes NVDA o MSFT, que pueden ser más sensibles a la valoración que un ETF amplio.", "mistake": "Un error común es pensar que las tasas explican todo movimiento bursátil. Beneficios, posicionamiento y sentimiento también importan.", "habit": "Usa las tasas como una lente: pregunta si la acción depende más del crecimiento futuro, del flujo de caja actual o del crédito."}}}, {"id": "inflation", "level": "foundation", "cat": "macroRates", "diff": "beginnerLevel", "emoji": "🔥", "title": {"en": "What is inflation?", "zh": "什么是通货膨胀？", "es": "¿Qué es la inflación?"}, "plain": {"en": "a general rise in prices over time", "zh": "整体物价水平随着时间上升", "es": "un aumento general de los precios con el tiempo"}, "content": {"en": {"what": "Inflation means goods and services become more expensive over time, reducing the purchasing power of money.", "why": "Investors care because inflation can change rates, profit margins, wages, and consumer behavior.", "example": "If food and energy prices rise sharply, households may spend more on necessities and less on discretionary items.", "portfolio": "Inflation can help energy holdings but pressure bonds and richly valued growth stocks.", "mistake": "A common mistake is thinking any inflation is automatically bad for every stock. Some sectors can benefit or pass costs through.", "habit": "Watch whether inflation is easing or re-accelerating, and which sectors in your portfolio are most exposed."}, "zh": {"what": "通货膨胀是指商品和服务价格普遍上涨，从而削弱货币购买力。", "why": "投资者关心通胀，因为它会影响利率、利润率、工资水平和消费者行为。", "example": "如果食品和能源价格大涨，家庭可能会把更多支出放在必需品上，减少可选消费。", "portfolio": "通胀可能利好能源持仓，但会压制债券和高估值成长股。", "mistake": "常见错误是认为“只要有通胀，所有股票都不好”。其实有些行业可以受益，或把成本转嫁出去。", "habit": "重点看通胀是在回落还是再度走高，以及你组合里哪些板块最敏感。"}, "es": {"what": "La inflación significa que los bienes y servicios se encarecen con el tiempo, reduciendo el poder adquisitivo del dinero.", "why": "Importa porque puede cambiar las tasas, los márgenes, los salarios y el comportamiento del consumidor.", "example": "Si suben mucho los precios de alimentos y energía, los hogares pueden gastar más en necesidades y menos en consumo discrecional.", "portfolio": "La inflación puede favorecer energía, pero presionar bonos y acciones de crecimiento muy valoradas.", "mistake": "Un error común es pensar que cualquier inflación es automáticamente mala para todas las acciones. Algunos sectores pueden beneficiarse o trasladar costos.", "habit": "Observa si la inflación está cediendo o reacelerándose y qué sectores de tu cartera están más expuestos."}}}, {"id": "fed", "level": "foundation", "cat": "macroRates", "diff": "beginnerLevel", "emoji": "🏛", "title": {"en": "What is the Fed?", "zh": "什么是美联储？", "es": "¿Qué es la Fed?"}, "plain": {"en": "the U.S. central bank", "zh": "美国的中央银行", "es": "el banco central de Estados Unidos"}, "content": {"en": {"what": "The Federal Reserve is the U.S. central bank. It sets short-term rates and helps manage inflation, employment, and financial stability.", "why": "Investors care because Fed decisions influence borrowing costs, liquidity, and market sentiment worldwide.", "example": "If the Fed signals fewer rate cuts than expected, stocks and bonds can both reprice quickly.", "portfolio": "Fed expectations can affect almost every holding in a portfolio, especially tech, banks, bonds, and the dollar.", "mistake": "A common mistake is focusing only on the rate decision and ignoring the Fed’s tone, projections, and press conference.", "habit": "Ask not only what the Fed did, but whether it was tighter or easier than the market expected."}, "zh": {"what": "美联储是美国的中央银行，负责设定短期利率，并在通胀、就业和金融稳定之间做平衡。", "why": "投资者关心美联储，因为它的决策会影响融资成本、流动性和全球市场情绪。", "example": "如果美联储暗示的降息次数少于市场预期，股票和债券都可能迅速重新定价。", "portfolio": "美联储预期几乎会影响组合中的所有资产，尤其是科技、银行、债券和美元。", "mistake": "常见错误是只盯着利率决定，却忽略美联储的措辞、预测和发布会。", "habit": "不要只看美联储“做了什么”，更要看它比市场预期更鹰派还是更鸽派。"}, "es": {"what": "La Reserva Federal es el banco central de EE. UU. Fija tasas de corto plazo y ayuda a gestionar inflación, empleo y estabilidad financiera.", "why": "Importa porque las decisiones de la Fed influyen en el costo del dinero, la liquidez y el sentimiento global del mercado.", "example": "Si la Fed señala menos recortes de lo esperado, tanto acciones como bonos pueden repricing rápidamente.", "portfolio": "Las expectativas sobre la Fed pueden afectar casi todas las posiciones, especialmente tecnología, bancos, bonos y dólar.", "mistake": "Un error común es mirar solo la decisión de tasas e ignorar el tono, las proyecciones y la rueda de prensa.", "habit": "No preguntes solo qué hizo la Fed, sino si fue más dura o más flexible de lo que esperaba el mercado."}}}, {"id": "diversification", "level": "foundation", "cat": "portfolioSkills", "diff": "beginnerLevel", "emoji": "🌈", "title": {"en": "What is diversification?", "zh": "什么是分散投资？", "es": "¿Qué es la diversificación?"}, "plain": {"en": "spreading investments across different assets instead of relying on one", "zh": "把资金分散到不同资产上，而不是只押一个方向", "es": "repartir inversiones entre distintos activos en vez de depender de uno solo"}, "content": {"en": {"what": "Diversification means not relying on one stock, sector, or asset to determine your entire outcome.", "why": "Investors care because diversification can reduce the damage from being wrong on any one idea.", "example": "A portfolio spread across a broad ETF, a few individual stocks, and some defensive exposure usually swings less than one concentrated bet.", "portfolio": "Diversification matters if your portfolio is heavily tilted toward one theme like AI, energy, or crypto.", "mistake": "A common mistake is owning many tickers that all react to the same theme and calling that diversified.", "habit": "Look through the labels and ask what economic forces actually drive your holdings."}, "zh": {"what": "分散投资的核心，是不要让一只股票、一个板块或一种资产决定你的全部结果。", "why": "投资者关心分散投资，因为它能降低单一判断错误带来的伤害。", "example": "同时持有宽基 ETF、少量个股和一些防御性资产的组合，通常比单一重仓押注波动更小。", "portfolio": "如果你的组合过度集中在 AI、能源或加密资产等单一主题，分散投资就尤其重要。", "mistake": "常见错误是持有很多股票代码，但它们其实都受同一个主题驱动，还以为这就叫分散。", "habit": "不要只看名称，要继续追问：这些持仓真正受哪些经济力量驱动？"}, "es": {"what": "Diversificar significa no depender de una sola acción, sector o activo para determinar todo tu resultado.", "why": "Importa porque puede reducir el daño de equivocarte en una sola idea.", "example": "Una cartera repartida entre un ETF amplio, unas pocas acciones y algo defensivo suele moverse menos que una apuesta concentrada.", "portfolio": "La diversificación importa mucho si tu cartera está muy inclinada a un solo tema, como IA, energía o cripto.", "mistake": "Un error común es tener muchos tickers que reaccionan al mismo tema y pensar que eso ya es diversificación.", "habit": "Mira más allá de las etiquetas y pregunta qué fuerzas económicas mueven realmente tus posiciones."}}}, {"id": "risk", "level": "builder", "cat": "portfolioSkills", "diff": "beginnerLevel", "emoji": "🛡", "title": {"en": "What is risk tolerance?", "zh": "什么是风险承受能力？", "es": "¿Qué es la tolerancia al riesgo?"}, "plain": {"en": "how much volatility and uncertainty you can realistically handle", "zh": "你能现实承受多大波动和不确定性", "es": "cuánta volatilidad e incertidumbre puedes soportar de forma realista"}, "content": {"en": {"what": "Risk tolerance is your ability and willingness to live through losses, volatility, and uncertainty without making destructive decisions.", "why": "Investors care because the best portfolio on paper is useless if you panic and abandon it in a drawdown.", "example": "A 100% stock portfolio may look attractive in a bull market, but it can feel very different during a 25% drawdown.", "portfolio": "Your risk tolerance should shape position size, cash needs, and how much exposure you take to volatile assets like crypto or high-growth stocks.", "mistake": "A common mistake is borrowing someone else’s risk tolerance from social media or a bull-market story.", "habit": "Build a portfolio you can stick with through bad weeks, not just one that looks exciting in good weeks."}, "zh": {"what": "风险承受能力，是你在面对亏损、波动和不确定性时，能否保持理性、不做破坏性决策。", "why": "投资者关心风险承受能力，因为纸面上再好的组合，如果你在下跌时扛不住，也没有意义。", "example": "在牛市里，100% 股票组合看上去很诱人，但在下跌 25% 时，感受会完全不同。", "portfolio": "你的风险承受能力，应该决定仓位大小、现金需求，以及你对加密资产或高成长股这类高波动资产的配置比例。", "mistake": "常见错误是从社交媒体或牛市故事里“借来”别人的风险承受能力。", "habit": "要构建一个在坏的时候你也能坚持下去的组合，而不是只在好时候看起来很刺激的组合。"}, "es": {"what": "La tolerancia al riesgo es tu capacidad y disposición para soportar pérdidas, volatilidad e incertidumbre sin tomar decisiones destructivas.", "why": "Importa porque la mejor cartera sobre el papel no sirve si entras en pánico y la abandonas en una caída.", "example": "Una cartera 100% acciones puede parecer atractiva en un mercado alcista, pero se siente muy distinta en una caída del 25%.", "portfolio": "Tu tolerancia al riesgo debería influir en el tamaño de posición, tus necesidades de liquidez y cuánto exponerte a activos volátiles como cripto o growth.", "mistake": "Un error común es tomar prestada la tolerancia al riesgo de otra persona, de redes sociales o de una historia de mercado alcista.", "habit": "Construye una cartera que puedas mantener en semanas malas, no solo una que se vea emocionante en semanas buenas."}}}, {"id": "allocation", "level": "builder", "cat": "portfolioSkills", "diff": "intermediateLevel", "emoji": "🧭", "title": {"en": "What is portfolio allocation?", "zh": "什么是资产配置？", "es": "¿Qué es la asignación de cartera?"}, "plain": {"en": "how you divide your money across assets, sectors, and strategies", "zh": "你把资金分配到不同资产、板块和策略上的方式", "es": "cómo divides tu dinero entre activos, sectores y estrategias"}, "content": {"en": {"what": "Portfolio allocation is the big-picture mix of what you own: stocks, bonds, cash, sectors, themes, and position sizes.", "why": "Investors care because allocation often drives long-term results more than any single stock pick.", "example": "Two investors can own the same stocks but have very different outcomes if one is 5% in tech and the other is 50%.", "portfolio": "Good allocation helps you understand whether your portfolio is truly balanced or accidentally tilted.", "mistake": "A common mistake is focusing on ticker count instead of actual exposure. Five holdings can still be one giant bet.", "habit": "Review your allocation regularly and ask what percentage of your portfolio each idea truly represents."}, "zh": {"what": "资产配置就是你“拥有什么”的整体组合：股票、债券、现金、板块、主题和各自仓位。", "why": "投资者重视资产配置，因为长期结果往往更多取决于配置结构，而不是某一次选股。", "example": "两个投资者可能持有同样的股票，但如果一个科技股占 5%，另一个占 50%，结果可能完全不同。", "portfolio": "好的资产配置能帮助你看清，自己的组合是有意平衡，还是无意中偏向了某个方向。", "mistake": "常见错误是只看“有几个代码”，而不看真实敞口。就算有五个持仓，也可能只是一个大赌注。", "habit": "定期回看配置，问自己：每个想法在整个组合里，真实占了多大比例？"}, "es": {"what": "La asignación de cartera es la mezcla general de lo que posees: acciones, bonos, efectivo, sectores, temas y tamaños de posición.", "why": "Importa porque la asignación suele influir más en los resultados a largo plazo que una sola selección de acciones.", "example": "Dos inversores pueden tener las mismas acciones pero resultados muy distintos si uno tiene 5% en tecnología y el otro 50%.", "portfolio": "Una buena asignación te ayuda a ver si tu cartera está realmente equilibrada o inclinada por accidente.", "mistake": "Un error común es fijarse en el número de tickers y no en la exposición real. Cinco posiciones pueden seguir siendo una gran apuesta.", "habit": "Revisa tu asignación con regularidad y pregunta qué porcentaje real de tu cartera representa cada idea."}}}, {"id": "growthvalue", "level": "builder", "cat": "portfolioSkills", "diff": "intermediateLevel", "emoji": "⚖️", "title": {"en": "Growth stocks vs value stocks", "zh": "成长股和价值股有什么区别？", "es": "Acciones de crecimiento vs acciones de valor"}, "plain": {"en": "growth emphasizes future expansion; value emphasizes lower valuation today", "zh": "成长看未来扩张；价值看当前估值更便宜", "es": "growth enfatiza expansión futura; value enfatiza valoración más baja hoy"}, "content": {"en": {"what": "Growth stocks are priced for future expansion, while value stocks are usually cheaper relative to their current fundamentals.", "why": "Investors care because different market environments often favor one style over the other.", "example": "When rates rise, value stocks like banks or industrials may hold up better than richly valued tech growth names.", "portfolio": "Knowing your style exposure helps explain why your portfolio is strong in some years and lagging in others.", "mistake": "A common mistake is thinking growth is always better because the winners look obvious in hindsight.", "habit": "Ask which style you own more of and whether that matches the economic backdrop and your tolerance for volatility."}, "zh": {"what": "成长股通常依赖未来扩张来支撑估值；价值股则通常相对当前基本面更便宜。", "why": "投资者关心风格差异，因为不同市场环境往往会更偏爱其中一种。", "example": "当利率上升时，银行或工业等价值股，往往比高估值科技成长股更抗跌。", "portfolio": "了解自己的风格暴露，有助于解释为什么组合在某些年份表现很好，而在另一些年份落后。", "mistake": "常见错误是事后看赢家，就以为成长股永远更好。", "habit": "要问自己：我更偏向哪种风格？这是否符合当前经济环境和我的波动承受能力？"}, "es": {"what": "Las acciones growth se valoran por su expansión futura, mientras las value suelen verse más baratas respecto a sus fundamentales actuales.", "why": "Importa porque distintos entornos de mercado suelen favorecer un estilo sobre el otro.", "example": "Cuando suben las tasas, acciones value como bancos o industriales pueden resistir mejor que tecnológicas growth de valoración elevada.", "portfolio": "Conocer tu exposición por estilo ayuda a explicar por qué tu cartera brilla en algunos años y se queda atrás en otros.", "mistake": "Un error común es pensar que growth siempre es mejor porque los ganadores parecen obvios mirando atrás.", "habit": "Pregunta qué estilo tienes en mayor peso y si eso encaja con el entorno económico y tu tolerancia a la volatilidad."}}}, {"id": "dividends", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "💸", "title": {"en": "Dividends explained", "zh": "什么是分红？", "es": "Dividendos explicados"}, "plain": {"en": "cash a company pays to shareholders from profits", "zh": "公司把利润中的一部分现金分配给股东", "es": "efectivo que una empresa paga a los accionistas con sus ganancias"}, "content": {"en": {"what": "A dividend is cash paid by a company to its shareholders, usually on a regular schedule.", "why": "Investors care because dividends can provide income and signal management confidence, though they are not guaranteed.", "example": "Mature companies in utilities, consumer staples, or energy often pay dividends, while younger growth firms may reinvest instead.", "portfolio": "Dividends can make a portfolio feel steadier, but high yield alone does not make a stock safer.", "mistake": "A common mistake is chasing the highest yield without checking whether the dividend is sustainable.", "habit": "Look at the business, cash flow, and payout ratio before treating a dividend as reliable income."}, "zh": {"what": "分红是公司按一定周期把现金支付给股东的一种方式。", "why": "投资者关心分红，因为它既能提供现金收入，也可能反映管理层的信心，但它并非保证不变。", "example": "公用事业、必需消费或能源等成熟公司更常分红，而年轻成长型公司往往选择把利润再投资。", "portfolio": "分红能让组合的现金回报更稳定，但“高股息”本身并不代表股票更安全。", "mistake": "常见错误是只追逐最高股息率，却不检查分红是否可持续。", "habit": "在把分红当成稳定收入之前，先看公司的业务、现金流和派息率。"}, "es": {"what": "Un dividendo es efectivo que una empresa paga a sus accionistas, normalmente con cierta regularidad.", "why": "Importa porque puede aportar ingresos y señalar confianza de la dirección, aunque no está garantizado.", "example": "Empresas maduras de utilities, consumo básico o energía suelen pagar dividendos, mientras las firmas jóvenes de crecimiento prefieren reinvertir.", "portfolio": "Los dividendos pueden dar más estabilidad a una cartera, pero un alto rendimiento por sí solo no hace una acción más segura.", "mistake": "Un error común es perseguir el mayor rendimiento sin revisar si el dividendo es sostenible.", "habit": "Mira el negocio, el flujo de caja y el payout ratio antes de tratar un dividendo como ingreso confiable."}}}, {"id": "earnings", "level": "builder", "cat": "newsDecoder", "diff": "intermediateLevel", "emoji": "📅", "title": {"en": "Earnings reports explained", "zh": "财报怎么看？", "es": "Resultados trimestrales explicados"}, "plain": {"en": "a company’s regular update on sales, profit, and outlook", "zh": "公司定期披露销售、利润和展望的报告", "es": "la actualización periódica de una empresa sobre ventas, ganancias y previsiones"}, "content": {"en": {"what": "An earnings report is a company’s scheduled update on revenue, profit, margins, and future guidance.", "why": "Investors care because earnings reports can reset expectations quickly and move a stock sharply.", "example": "A company can beat last quarter’s numbers but still fall if forward guidance disappoints.", "portfolio": "If you own individual stocks, earnings season can be one of the biggest sources of short-term volatility.", "mistake": "A common mistake is looking only at the headline beat or miss and ignoring guidance or margin trends.", "habit": "Read the headline, then check guidance, margins, and whether the reaction is about expectations rather than just the raw numbers."}, "zh": {"what": "财报是公司定期公布收入、利润、利润率和未来指引的窗口。", "why": "投资者重视财报，因为它能迅速改变市场预期，并让股价大幅波动。", "example": "一家公司即使超出上季度预期，如果未来指引不佳，股价也照样可能下跌。", "portfolio": "如果你持有个股，财报季往往是短期波动最集中的时期之一。", "mistake": "常见错误是只看“超预期”还是“低于预期”，却忽略了指引和利润率趋势。", "habit": "先看结果，再看指引、利润率，以及这次波动到底是“数字本身”还是“预期变化”在驱动。"}, "es": {"what": "Un reporte de resultados es la actualización programada de una empresa sobre ingresos, beneficios, márgenes y guía futura.", "why": "Importa porque los resultados pueden cambiar rápidamente las expectativas y mover una acción con fuerza.", "example": "Una empresa puede superar las cifras del trimestre y aun así caer si decepciona su guía futura.", "portfolio": "Si tienes acciones individuales, la temporada de resultados suele ser una de las mayores fuentes de volatilidad a corto plazo.", "mistake": "Un error común es mirar solo si superó o no las estimaciones e ignorar la guía o la tendencia de márgenes.", "habit": "Lee el titular y luego revisa la guía, los márgenes y si la reacción responde a expectativas más que a las cifras puras."}}}, {"id": "revenueprofit", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "🧾", "title": {"en": "Revenue vs profit", "zh": "收入和利润有什么区别？", "es": "Ingresos vs beneficio"}, "plain": {"en": "revenue is money coming in; profit is what remains after costs", "zh": "收入是进来的钱；利润是扣除成本后剩下的钱", "es": "los ingresos son el dinero que entra; el beneficio es lo que queda tras los costos"}, "content": {"en": {"what": "Revenue is the money a company brings in from sales. Profit is what remains after expenses.", "why": "Investors care because strong sales without healthy profits may not create much shareholder value.", "example": "A retailer may report rising revenue during the holidays, but profit can still fall if discounts or costs rise too much.", "portfolio": "Understanding the difference helps you avoid being impressed by growth that is not turning into real earnings.", "mistake": "A common mistake is assuming revenue growth automatically means a business is getting stronger.", "habit": "When reviewing a company, check whether revenue growth is improving profit, margins, or cash flow as well."}, "zh": {"what": "收入是公司卖东西或提供服务赚进来的钱；利润则是扣除各种成本后剩下的部分。", "why": "投资者关心两者区别，因为“卖得多”如果赚不到钱，也未必能为股东创造价值。", "example": "零售商在假日季可能收入增长，但如果打折太多或成本上升，利润仍可能下滑。", "portfolio": "理解两者差别，可以避免被“看起来很快的增长”迷惑，而忽视它是否真的转化成盈利。", "mistake": "常见错误是把收入增长自动等同于公司变得更强。", "habit": "看公司时，要继续追问：收入增长是否也带动了利润、利润率或现金流改善？"}, "es": {"what": "Los ingresos son el dinero que entra por ventas. El beneficio es lo que queda después de los gastos.", "why": "Importa porque vender mucho sin beneficios saludables puede no crear mucho valor para el accionista.", "example": "Un minorista puede reportar ingresos crecientes en temporada navideña, pero el beneficio puede caer si suben demasiado los descuentos o costos.", "portfolio": "Entender la diferencia te ayuda a no impresionarte con un crecimiento que no se convierte en ganancias reales.", "mistake": "Un error común es asumir que crecer en ingresos significa automáticamente que el negocio está más fuerte.", "habit": "Al revisar una empresa, pregunta si el crecimiento de ingresos también mejora beneficios, márgenes o flujo de caja."}}}, {"id": "fcf", "level": "strategist", "cat": "investorTools", "diff": "intermediateLevel", "emoji": "💧", "title": {"en": "Free cash flow", "zh": "什么是自由现金流？", "es": "Flujo de caja libre"}, "plain": {"en": "cash left after a company pays for operating costs and necessary investment", "zh": "公司支付经营成本和必要投资后剩下的现金", "es": "el efectivo que queda tras cubrir costos operativos e inversión necesaria"}, "content": {"en": {"what": "Free cash flow is the cash a business generates after paying for operations and the investments needed to keep the business running.", "why": "Investors care because cash is harder to fake than narrative, and strong free cash flow can support buybacks, dividends, or reinvestment.", "example": "A company may report accounting profit, but if cash collection is weak or capital spending is heavy, free cash flow may be low.", "portfolio": "For mature companies, free cash flow often tells you more about business quality than revenue growth alone.", "mistake": "A common mistake is ignoring why free cash flow is low. Sometimes it reflects weakness, but sometimes it reflects heavy investment for future growth.", "habit": "Use free cash flow together with earnings and capital spending to understand the full picture."}, "zh": {"what": "自由现金流，是公司在支付经营成本和维持业务所需投资之后，真正剩下的现金。", "why": "投资者关心自由现金流，因为“现金”比故事更难伪装，充沛的现金流还能支持回购、分红或再投资。", "example": "一家公司即使账面利润不错，如果回款差或资本开支很重，自由现金流也可能并不理想。", "portfolio": "对于成熟企业，自由现金流往往比单看收入增长更能反映业务质量。", "mistake": "常见错误是只看到自由现金流低，却不问原因；有时这是经营变差，有时则是为了未来增长而大举投资。", "habit": "把自由现金流和利润、资本开支一起看，才能更完整理解公司的真实状况。"}, "es": {"what": "El flujo de caja libre es el efectivo que una empresa genera después de pagar operaciones y la inversión necesaria para seguir funcionando.", "why": "Importa porque el efectivo es más difícil de maquillar que una narrativa, y un buen flujo de caja libre puede financiar recompras, dividendos o reinversión.", "example": "Una empresa puede reportar beneficio contable, pero si cobra mal o gasta mucho en inversión, su flujo de caja libre puede ser bajo.", "portfolio": "En empresas maduras, el flujo de caja libre suele decir más sobre la calidad del negocio que el crecimiento de ingresos por sí solo.", "mistake": "Un error común es ver un flujo de caja libre bajo sin preguntar por qué. A veces refleja debilidad; otras, inversión fuerte para crecer.", "habit": "Usa el flujo de caja libre junto con ganancias y gasto de capital para entender el panorama completo."}}}, {"id": "balancesheet", "level": "strategist", "cat": "investorTools", "diff": "intermediateLevel", "emoji": "📋", "title": {"en": "Balance sheets", "zh": "什么是资产负债表？", "es": "Balances generales"}, "plain": {"en": "a snapshot of what a company owns, owes, and the equity left over", "zh": "公司在某一时点拥有什么、欠什么，以及剩余权益的快照", "es": "una foto de lo que una empresa posee, debe y del patrimonio restante"}, "content": {"en": {"what": "A balance sheet shows assets, liabilities, and shareholder equity at a specific point in time.", "why": "Investors care because balance-sheet strength influences resilience, borrowing capacity, and risk in a downturn.", "example": "Two companies may have similar profits, but the one with lower debt and more cash may be much safer.", "portfolio": "Looking at the balance sheet can help you understand which holdings are more vulnerable when financing conditions tighten.", "mistake": "A common mistake is focusing only on income statements and ignoring debt, liquidity, and asset quality.", "habit": "Before calling a company “safe,” check its debt load, cash balance, and whether assets can support the business."}, "zh": {"what": "资产负债表展示的是公司在某个时点的资产、负债和股东权益。", "why": "投资者关心资产负债表，因为它决定公司在下行环境中的韧性、融资能力和风险水平。", "example": "两家公司利润可能差不多，但负债更低、现金更多的那一家，通常安全得多。", "portfolio": "看资产负债表，能帮助你判断哪些持仓在融资环境收紧时更脆弱。", "mistake": "常见错误是只看利润表，而忽略负债、流动性和资产质量。", "habit": "在说一家公司“安全”之前，先看它的负债、现金，以及这些资产是否真正支撑业务。"}, "es": {"what": "El balance general muestra activos, pasivos y patrimonio en un momento concreto.", "why": "Importa porque la fortaleza del balance influye en la resiliencia, la capacidad de endeudarse y el riesgo en una desaceleración.", "example": "Dos empresas pueden tener beneficios similares, pero la que tiene menos deuda y más efectivo puede ser mucho más segura.", "portfolio": "Mirar el balance te ayuda a entender qué posiciones son más vulnerables cuando se endurecen las condiciones financieras.", "mistake": "Un error común es centrarse solo en la cuenta de resultados e ignorar deuda, liquidez y calidad de activos.", "habit": "Antes de llamar “segura” a una empresa, revisa su deuda, su efectivo y si sus activos sostienen el negocio."}}}, {"id": "recession", "level": "strategist", "cat": "macroRates", "diff": "advancedLevel", "emoji": "🌫", "title": {"en": "Recession indicators", "zh": "衰退信号怎么看？", "es": "Indicadores de recesión"}, "plain": {"en": "signals that economic growth may be slowing meaningfully", "zh": "提示经济增长可能明显放缓的信号", "es": "señales de que el crecimiento económico puede estar desacelerándose de forma significativa"}, "content": {"en": {"what": "Recession indicators are economic clues that growth, hiring, or spending may be weakening.", "why": "Investors care because recession risk can affect profits, credit quality, rates, and market leadership.", "example": "Weak manufacturing surveys, softer hiring, and falling consumer confidence together can raise recession concerns.", "portfolio": "Defensive sectors and high-quality balance sheets may hold up better when recession worries rise.", "mistake": "A common mistake is treating one weak data point as proof that a recession has definitely started.", "habit": "Look for a pattern across several indicators instead of reacting to one headline in isolation."}, "zh": {"what": "衰退信号是一些经济线索，提示增长、就业或消费可能正在走弱。", "why": "投资者关心衰退，因为它会影响企业利润、信用质量、利率走势和市场风格。", "example": "制造业调查走弱、招聘放缓和消费者信心下滑，如果同时出现，就会提升衰退担忧。", "portfolio": "当衰退担忧升温时，防御型板块和资产负债表更强的公司通常更抗跌。", "mistake": "常见错误是看到一项疲弱数据，就断定衰退一定已经开始。", "habit": "不要被单一标题牵着走，要看多个指标是否在同一个方向上形成共振。"}, "es": {"what": "Los indicadores de recesión son pistas económicas de que el crecimiento, el empleo o el gasto se están debilitando.", "why": "Importa porque el riesgo de recesión puede afectar beneficios, calidad crediticia, tasas y liderazgo del mercado.", "example": "Encuestas manufactureras débiles, contratación más lenta y menor confianza del consumidor pueden aumentar el miedo a recesión.", "portfolio": "Cuando aumenta el temor a recesión, los sectores defensivos y los balances de mayor calidad suelen resistir mejor.", "mistake": "Un error común es tomar un solo dato débil como prueba de que una recesión ya comenzó.", "habit": "Busca un patrón entre varios indicadores en lugar de reaccionar a un solo titular aislado."}}}, {"id": "bullbear", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "🐂", "title": {"en": "Bull market vs bear market", "zh": "牛市和熊市的区别", "es": "Mercado alcista vs bajista"}, "plain": {"en": "bull markets trend upward; bear markets trend downward", "zh": "牛市整体向上；熊市整体向下", "es": "los mercados alcistas tienden a subir; los bajistas a bajar"}, "content": {"en": {"what": "A bull market is a sustained upward trend in prices and confidence. A bear market is a sustained downward trend with weaker sentiment.", "why": "Investors care because market regime affects behavior, risk appetite, and how much bad news prices can tolerate.", "example": "In a bull market, investors may buy dips quickly; in a bear market, rallies can fade fast as sellers use them to exit.", "portfolio": "Knowing the regime helps you set expectations for volatility, drawdowns, and how aggressively to add risk.", "mistake": "A common mistake is assuming the last few months define the next few years. Market regimes can change.", "habit": "Use the market regime to manage risk, not to force heroic predictions about exact tops or bottoms."}, "zh": {"what": "牛市是价格和信心持续上升的阶段；熊市则是价格持续下跌、情绪更悲观的阶段。", "why": "投资者关心市场所处阶段，因为它会影响风险偏好、行为方式，以及市场对坏消息的承受能力。", "example": "牛市里，投资者往往更愿意逢低买入；熊市中，反弹常常很快被卖盘压下。", "portfolio": "知道当前更像牛市还是熊市，有助于你更合理地预期波动、回撤和加仓节奏。", "mistake": "常见错误是把过去几个月的走势，直接当成未来几年的模板。市场阶段是会变化的。", "habit": "把市场阶段当成风险管理工具，而不是去精确猜顶猜底。"}, "es": {"what": "Un mercado alcista es una subida sostenida de precios y confianza. Un mercado bajista es una caída sostenida con sentimiento más débil.", "why": "Importa porque el régimen de mercado afecta el apetito por riesgo, el comportamiento y cuánto malas noticias puede tolerar el precio.", "example": "En un mercado alcista los inversores suelen comprar caídas; en uno bajista, los rebotes pueden agotarse rápido.", "portfolio": "Conocer el régimen te ayuda a ajustar expectativas sobre volatilidad, caídas y cuán agresivamente añadir riesgo.", "mistake": "Un error común es pensar que los últimos meses definen los próximos años. Los regímenes cambian.", "habit": "Usa el régimen de mercado para gestionar riesgo, no para intentar adivinar techos o suelos exactos."}}}, {"id": "oil", "level": "builder", "cat": "macroRates", "diff": "intermediateLevel", "emoji": "🛢", "title": {"en": "Why oil prices matter", "zh": "为什么油价很重要？", "es": "¿Por qué importa el precio del petróleo?"}, "plain": {"en": "oil affects inflation, transportation costs, and energy profits", "zh": "油价会影响通胀、运输成本和能源企业利润", "es": "el petróleo afecta inflación, costos de transporte y beneficios energéticos"}, "content": {"en": {"what": "Oil prices matter because energy is a major input cost across the economy, from transportation to manufacturing.", "why": "Investors care because oil can influence inflation, consumer spending, and profits across many sectors.", "example": "When oil spikes, energy producers may benefit while airlines or transport companies may face margin pressure.", "portfolio": "If you own XLE, oil can provide a useful hedge when inflation worries hurt parts of the rest of your portfolio.", "mistake": "A common mistake is assuming higher oil is always good or always bad. The answer depends on what you own.", "habit": "When oil moves, ask which holdings benefit, which suffer, and whether the inflation link matters more than the commodity move itself."}, "zh": {"what": "油价之所以重要，是因为能源是经济中很多活动的核心成本，从运输到制造都离不开它。", "why": "投资者关心油价，因为它会影响通胀、消费能力以及很多行业的利润。", "example": "当油价大涨时，能源生产商可能受益，而航空或运输公司则可能承受利润压力。", "portfolio": "如果你持有 XLE，油价上行有时能在通胀冲击其他持仓时，提供一定对冲作用。", "mistake": "常见错误是把“油价上涨”简单看成永远利好或永远利空；关键还是看你持有什么。", "habit": "当油价波动时，先分清哪些持仓受益、哪些受损，以及通胀传导是否比油价本身更重要。"}, "es": {"what": "El precio del petróleo importa porque la energía es un costo clave en toda la economía, desde transporte hasta manufactura.", "why": "Importa porque puede influir en inflación, gasto del consumidor y beneficios en muchos sectores.", "example": "Cuando sube mucho el petróleo, los productores de energía pueden beneficiarse mientras aerolíneas o transporte sufren presión en márgenes.", "portfolio": "Si tienes XLE, el petróleo puede actuar como cobertura útil cuando la inflación presiona otras partes de tu cartera.", "mistake": "Un error común es pensar que un petróleo más alto siempre es bueno o siempre es malo. Depende de lo que tengas.", "habit": "Cuando se mueva el petróleo, pregunta qué posiciones ganan, cuáles pierden y si el vínculo con la inflación pesa más que la materia prima en sí."}}}, {"id": "banks", "level": "builder", "cat": "investorTools", "diff": "intermediateLevel", "emoji": "🏦", "title": {"en": "How banks make money", "zh": "银行是怎么赚钱的？", "es": "¿Cómo ganan dinero los bancos?"}, "plain": {"en": "by lending, charging fees, and managing financial flows", "zh": "通过放贷、收取手续费和提供金融服务赚钱", "es": "prestando dinero, cobrando comisiones y gestionando flujos financieros"}, "content": {"en": {"what": "Banks make money mainly by earning interest on loans, charging fees, and using deposits to fund their activities.", "why": "Investors care because bank profits are sensitive to interest rates, credit quality, and economic confidence.", "example": "Higher rates can support net interest income, but if loan defaults rise too much, that benefit can fade.", "portfolio": "If you own JPM, you should watch both the rate backdrop and whether credit conditions are improving or deteriorating.", "mistake": "A common mistake is thinking higher rates are automatically great for every bank in every situation.", "habit": "Look at both earnings power and balance-sheet quality when evaluating a bank stock."}, "zh": {"what": "银行主要通过贷款赚取利差、收取手续费，并利用存款开展业务来赚钱。", "why": "投资者关心银行，因为它们的盈利对利率、信用质量和经济信心都很敏感。", "example": "高利率可能提升净利息收入，但如果坏账上升太多，这种好处也会被抵消。", "portfolio": "如果你持有 JPM，就要同时关注利率环境，以及信用状况是在改善还是恶化。", "mistake": "常见错误是以为“利率越高，对所有银行都越好”。事实并非总是如此。", "habit": "分析银行股时，要同时看盈利能力和资产负债表质量。"}, "es": {"what": "Los bancos ganan dinero principalmente cobrando intereses en préstamos, comisiones y utilizando depósitos para financiar sus actividades.", "why": "Importa porque las ganancias bancarias son sensibles a tasas, calidad crediticia y confianza económica.", "example": "Tasas más altas pueden apoyar el margen de interés, pero si suben demasiado los impagos, ese beneficio se desvanece.", "portfolio": "Si tienes JPM, debes vigilar tanto el entorno de tasas como si las condiciones crediticias mejoran o empeoran.", "mistake": "Un error común es pensar que tasas más altas son automáticamente excelentes para todos los bancos siempre.", "habit": "Al evaluar un banco, mira tanto su capacidad de ganar dinero como la calidad de su balance."}}}, {"id": "aihype", "level": "builder", "cat": "aiThemes", "diff": "intermediateLevel", "emoji": "🤖", "title": {"en": "AI stocks and market hype", "zh": "AI 股票和市场热度", "es": "Acciones de IA y hype del mercado"}, "plain": {"en": "AI excitement can drive both real opportunity and over-optimistic pricing", "zh": "AI 热潮既可能带来真实机会，也可能推高过度乐观的定价", "es": "el entusiasmo por la IA puede crear oportunidades reales y precios demasiado optimistas"}, "content": {"en": {"what": "AI hype means investors get excited about companies linked to artificial intelligence, sometimes for solid reasons and sometimes too aggressively.", "why": "Investors care because themes can create big winners, but crowded expectations can also create painful drawdowns.", "example": "A chip company may rally on AI demand, but if growth merely meets lofty expectations, the stock can still disappoint.", "portfolio": "If your portfolio already owns several AI winners, the bigger risk may be concentration rather than missing the theme.", "mistake": "A common mistake is confusing a strong story with a low-risk valuation.", "habit": "Separate the quality of the theme from the price you are being asked to pay for it."}, "zh": {"what": "AI 热度指的是，市场会对与人工智能相关的公司产生高度兴奋，有时有基本面支撑，有时也会过于激进。", "why": "投资者关心 AI 主题，因为它既能创造大赢家，也可能因预期过满而带来剧烈回撤。", "example": "一家芯片公司可能因 AI 需求上涨，但如果增长只是“达到”很高的预期，股价仍可能让人失望。", "portfolio": "如果你的组合已经持有多个 AI 赢家，真正更大的风险可能不是“错过主题”，而是“过度集中”。", "mistake": "常见错误是把“故事很强”误认为“估值风险很低”。", "habit": "要把“主题质量”与“你为这个主题付出的价格”分开看。"}, "es": {"what": "El hype de IA significa que los inversores se entusiasman con empresas ligadas a la inteligencia artificial, a veces con fundamento y otras de forma excesiva.", "why": "Importa porque los temas pueden crear grandes ganadores, pero expectativas demasiado llenas también pueden provocar caídas dolorosas.", "example": "Una empresa de chips puede subir por la demanda de IA, pero si el crecimiento solo cumple expectativas muy altas, la acción aún puede decepcionar.", "portfolio": "Si tu cartera ya tiene varios ganadores de IA, el mayor riesgo puede ser la concentración, no perderte el tema.", "mistake": "Un error común es confundir una historia poderosa con una valoración de bajo riesgo.", "habit": "Separa la calidad del tema del precio que te piden pagar por él."}}}, {"id": "semis", "level": "strategist", "cat": "aiThemes", "diff": "intermediateLevel", "emoji": "🧠", "title": {"en": "Semiconductor supply chain", "zh": "半导体供应链", "es": "Cadena de suministro de semiconductores"}, "plain": {"en": "the network that designs, manufactures, equips, and ships chips", "zh": "设计、制造、设备和运输芯片的完整网络", "es": "la red que diseña, fabrica, equipa y distribuye chips"}, "content": {"en": {"what": "The semiconductor supply chain includes chip designers, foundries, equipment makers, and the companies that package and ship chips.", "why": "Investors care because bottlenecks or demand shifts in one part of the chain can affect many companies.", "example": "A surge in AI server demand may help chip designers and some equipment suppliers before the benefits reach other parts of tech.", "portfolio": "Understanding the chain helps you see whether your exposure is concentrated in one narrow piece of the semiconductor story.", "mistake": "A common mistake is treating “semis” as one simple trade when different parts of the chain have different cycles and margins.", "habit": "When a semiconductor headline appears, ask where in the chain the impact is strongest first."}, "zh": {"what": "半导体供应链包括芯片设计公司、晶圆代工厂、设备商，以及封装和运输相关企业。", "why": "投资者关注半导体供应链，因为链条中某一环节的瓶颈或需求变化，会传导到很多公司。", "example": "AI 服务器需求上升，可能先利好芯片设计公司和部分设备商，之后才逐步传导到其他科技环节。", "portfolio": "理解供应链，有助于你判断自己的半导体暴露，是分布在多环节，还是只集中在某一个细分领域。", "mistake": "常见错误是把“半导体”当成一个简单交易，而忽略供应链各环节拥有不同的周期和利润结构。", "habit": "看到半导体新闻时，先问：影响最先落在供应链的哪一环？"}, "es": {"what": "La cadena de semiconductores incluye diseñadores de chips, fundiciones, fabricantes de equipos y empresas de empaquetado y envío.", "why": "Importa porque cuellos de botella o cambios de demanda en una parte de la cadena pueden afectar a muchas empresas.", "example": "Un aumento de la demanda de servidores de IA puede beneficiar primero a diseñadores de chips y proveedores de equipos antes que a otras partes del sector tech.", "portfolio": "Entender la cadena te ayuda a ver si tu exposición está repartida o concentrada en un tramo muy específico de la historia semiconductor.", "mistake": "Un error común es tratar “semis” como una sola operación simple, cuando las distintas partes de la cadena tienen ciclos y márgenes distintos.", "habit": "Cuando aparezca un titular sobre semiconductores, pregunta en qué parte de la cadena impacta primero."}}}, {"id": "consumer", "level": "builder", "cat": "newsDecoder", "diff": "intermediateLevel", "emoji": "🛍", "title": {"en": "Consumer stocks", "zh": "消费股", "es": "Acciones de consumo"}, "plain": {"en": "companies that sell goods or services directly to households", "zh": "直接向家庭出售商品或服务的公司", "es": "empresas que venden bienes o servicios directamente a los hogares"}, "content": {"en": {"what": "Consumer stocks include businesses tied to everyday spending, from essentials to discretionary purchases.", "why": "Investors care because consumer behavior is a direct signal of economic health and household confidence.", "example": "During a slowdown, consumers may cut back on travel and luxury purchases while still buying groceries and household staples.", "portfolio": "Consumer exposure can help you understand whether your portfolio leans more toward defensive staples or cyclical spending.", "mistake": "A common mistake is treating all consumer stocks as the same when staples and discretionary businesses behave differently.", "habit": "Ask whether the company sells what people need, what people want, or both."}, "zh": {"what": "消费股覆盖很多和日常支出有关的公司，从必需品到可选消费都包括在内。", "why": "投资者重视消费股，因为消费者行为本身就是经济健康和家庭信心的直接反映。", "example": "经济放缓时，消费者可能减少旅游和奢侈消费，但仍会购买食品和日常用品。", "portfolio": "看消费股敞口，有助于判断你的组合更偏防御性的必需消费，还是更偏周期性的可选消费。", "mistake": "常见错误是把所有消费股都当成一类，忽略了必需消费和可选消费的表现差异。", "habit": "先问这家公司卖的是“人们必须买的”，还是“人们想买的”，或者两者兼有。"}, "es": {"what": "Las acciones de consumo incluyen negocios ligados al gasto diario, desde productos esenciales hasta compras discrecionales.", "why": "Importa porque el comportamiento del consumidor es una señal directa de la salud económica y la confianza de los hogares.", "example": "Durante una desaceleración, los consumidores pueden recortar viajes y lujo, pero seguir comprando alimentos y productos básicos.", "portfolio": "La exposición al consumo te ayuda a ver si tu cartera se inclina a staples defensivos o a gasto cíclico.", "mistake": "Un error común es tratar todas las acciones de consumo como iguales, cuando staples y discrecional se comportan distinto.", "habit": "Pregunta si la empresa vende lo que la gente necesita, lo que quiere, o una mezcla de ambas cosas."}}}, {"id": "healthcare", "level": "builder", "cat": "newsDecoder", "diff": "intermediateLevel", "emoji": "💊", "title": {"en": "Healthcare stocks", "zh": "医疗健康股", "es": "Acciones de salud"}, "plain": {"en": "companies involved in drugs, devices, insurance, or medical services", "zh": "涉及药品、器械、保险或医疗服务的公司", "es": "empresas ligadas a fármacos, equipos, seguros o servicios médicos"}, "content": {"en": {"what": "Healthcare stocks cover pharmaceutical firms, insurers, equipment makers, and healthcare service providers.", "why": "Investors care because healthcare can be both defensive and innovation-driven, depending on the business model.", "example": "A drug developer may move on trial results, while a large insurer may react more to reimbursement or cost trends.", "portfolio": "Healthcare can add diversification because it does not always move for the same reasons as tech or energy.", "mistake": "A common mistake is assuming all healthcare stocks are automatically safe. Some are highly binary or regulation-sensitive.", "habit": "Identify whether the company’s main risk is innovation, regulation, reimbursement, or execution."}, "zh": {"what": "医疗健康股包括制药公司、保险公司、医疗器械厂商以及医疗服务提供者。", "why": "投资者关注医疗股，因为它既可能是防御型板块，也可能由创新驱动，取决于具体商业模式。", "example": "药企可能因临床试验结果波动，而大型保险公司则更容易受报销政策或成本趋势影响。", "portfolio": "医疗板块有助于分散风险，因为它的驱动因素并不总和科技或能源一样。", "mistake": "常见错误是认为所有医疗股都天然安全；其实有些公司结果很二元，也对政策非常敏感。", "habit": "先识别这家公司最主要的风险到底是创新、监管、报销，还是执行。"}, "es": {"what": "Las acciones de salud abarcan farmacéuticas, aseguradoras, fabricantes de equipos y proveedores de servicios médicos.", "why": "Importa porque la salud puede ser defensiva y también estar impulsada por innovación, según el modelo de negocio.", "example": "Un desarrollador de fármacos puede moverse por resultados clínicos, mientras una aseguradora grande reacciona más a reembolsos o costos.", "portfolio": "La salud puede añadir diversificación porque no siempre se mueve por las mismas razones que tecnología o energía.", "mistake": "Un error común es asumir que todas las acciones de salud son automáticamente seguras. Algunas son muy binarias o sensibles a regulación.", "habit": "Identifica si el principal riesgo de la empresa es innovación, regulación, reembolso o ejecución."}}}, {"id": "reit", "level": "builder", "cat": "portfolioSkills", "diff": "intermediateLevel", "emoji": "🏘", "title": {"en": "Real estate and REITs", "zh": "房地产和 REITs", "es": "Inmobiliario y REITs"}, "plain": {"en": "real estate exposure through companies that own or finance property", "zh": "通过拥有或融资物业的公司来获得房地产敞口", "es": "exposición inmobiliaria a través de empresas que poseen o financian propiedades"}, "content": {"en": {"what": "REITs are real-estate investment trusts that usually own income-producing properties or finance real estate assets.", "why": "Investors care because real estate can provide income and diversification, but it is sensitive to rates and property demand.", "example": "Office, apartment, retail, and data-center REITs can all react differently to the same economic environment.", "portfolio": "REIT exposure can broaden your portfolio, but high rates can pressure property values and financing conditions.", "mistake": "A common mistake is buying a REIT only for yield without understanding what kind of property it owns.", "habit": "Check the property type, occupancy, debt, and sensitivity to rates before treating a REIT like a bond substitute."}, "zh": {"what": "REIT 是房地产投资信托，通常持有能产生租金收入的物业，或为房地产资产提供融资。", "why": "投资者关心 REIT，因为房地产既可能带来收入和分散效果，也对利率和物业需求非常敏感。", "example": "办公楼、公寓、零售和数据中心 REIT，在同一个经济环境下，表现可能完全不同。", "portfolio": "配置 REIT 能拓宽组合敞口，但高利率会压制物业估值和融资环境。", "mistake": "常见错误是只因为股息率高就买 REIT，却不清楚它到底持有哪些类型的物业。", "habit": "在把 REIT 当成“债券替代品”之前，先看物业类型、出租率、负债和利率敏感度。"}, "es": {"what": "Los REITs son fideicomisos de inversión inmobiliaria que suelen poseer propiedades generadoras de ingresos o financiar activos inmobiliarios.", "why": "Importa porque el inmobiliario puede aportar ingresos y diversificación, pero es sensible a tasas y demanda de propiedades.", "example": "Los REITs de oficinas, apartamentos, retail o centros de datos pueden reaccionar de forma muy distinta al mismo entorno económico.", "portfolio": "Tener REITs puede ampliar tu exposición, pero tasas altas pueden presionar el valor de los inmuebles y la financiación.", "mistake": "Un error común es comprar un REIT solo por su dividendo sin entender qué tipo de propiedad posee.", "habit": "Revisa tipo de propiedad, ocupación, deuda y sensibilidad a tasas antes de tratar un REIT como sustituto de bono."}}}, {"id": "crypto", "level": "builder", "cat": "marketBasics", "diff": "intermediateLevel", "emoji": "₿", "title": {"en": "Crypto basics", "zh": "加密资产基础", "es": "Conceptos básicos de cripto"}, "plain": {"en": "digital assets that trade largely on network belief, utility, and liquidity", "zh": "主要由网络共识、用途和流动性驱动的数字资产", "es": "activos digitales cuyo valor depende en gran parte de utilidad, confianza de red y liquidez"}, "content": {"en": {"what": "Crypto assets are digital tokens whose prices are often driven by adoption, liquidity, regulation, and investor sentiment.", "why": "Investors care because crypto can offer upside and diversification, but it can also be extremely volatile.", "example": "Bitcoin may rise when liquidity and risk appetite are improving, then fall quickly when conditions tighten.", "portfolio": "In a portfolio, crypto position size matters more than the excitement of the headline.", "mistake": "A common mistake is sizing crypto like a stable core holding when it behaves more like a high-volatility risk asset.", "habit": "Treat crypto as a deliberate risk allocation and decide the size before emotions take over."}, "zh": {"what": "加密资产是数字代币，其价格往往受到采用程度、流动性、监管和投资情绪影响。", "why": "投资者关注加密资产，因为它可能带来上涨空间和不同的敞口，但波动也非常大。", "example": "当流动性改善、风险偏好升温时，比特币可能上涨；当环境收紧时，它也可能迅速回落。", "portfolio": "在组合里，加密资产最重要的不是标题有多热，而是仓位有多大。", "mistake": "常见错误是把加密资产当成稳定核心仓位来配，但它更像一种高波动风险资产。", "habit": "把加密资产当成一项主动承担的风险配置，并在情绪上头之前先定好仓位。"}, "es": {"what": "Los criptoactivos son tokens digitales cuyos precios suelen estar impulsados por adopción, liquidez, regulación y sentimiento inversor.", "why": "Importa porque cripto puede ofrecer potencial alcista y diversificación, pero también mucha volatilidad.", "example": "Bitcoin puede subir cuando mejoran la liquidez y el apetito por riesgo, y caer rápido cuando las condiciones se endurecen.", "portfolio": "En una cartera, el tamaño de la posición en cripto importa más que lo emocionante del titular.", "mistake": "Un error común es dimensionar cripto como si fuera una posición núcleo estable, cuando se comporta más como un activo de riesgo muy volátil.", "habit": "Trata cripto como una asignación deliberada de riesgo y decide su tamaño antes de que manden las emociones."}}}, {"id": "fx", "level": "strategist", "cat": "macroRates", "diff": "intermediateLevel", "emoji": "🌎", "title": {"en": "Currency and FX basics", "zh": "汇率与外汇基础", "es": "Conceptos básicos de divisas y FX"}, "plain": {"en": "the relative value of one currency versus another", "zh": "一种货币相对于另一种货币的价值", "es": "el valor relativo de una moneda frente a otra"}, "content": {"en": {"what": "FX refers to foreign exchange: the price of one currency relative to another.", "why": "Investors care because currencies affect international returns, import costs, commodity prices, and global competitiveness.", "example": "A stronger U.S. dollar can pressure multinational earnings when foreign revenue translates back into dollars.", "portfolio": "Even if you mainly own U.S. assets, FX still matters through companies, commodities, and global sentiment.", "mistake": "A common mistake is thinking currency moves matter only to travelers or exporters.", "habit": "When the dollar moves sharply, ask which holdings or sectors gain from that and which ones lose."}, "zh": {"what": "外汇（FX）就是一种货币相对于另一种货币的价格。", "why": "投资者关心汇率，因为它会影响海外投资回报、进口成本、大宗商品价格和全球竞争力。", "example": "美元走强时，跨国公司的海外收入换算回美元后，可能会显得更弱。", "portfolio": "即使你主要持有美国资产，汇率仍会通过企业、商品和全球情绪间接影响你的组合。", "mistake": "常见错误是以为汇率波动只跟游客或出口商有关。", "habit": "当美元大幅波动时，先看哪些持仓和板块受益，哪些会承压。"}, "es": {"what": "FX significa tipo de cambio: el precio de una moneda frente a otra.", "why": "Importa porque las divisas afectan retornos internacionales, costos de importación, materias primas y competitividad global.", "example": "Un dólar fuerte puede presionar las ganancias de multinacionales cuando los ingresos extranjeros se traducen a dólares.", "portfolio": "Aunque poseas sobre todo activos de EE. UU., FX sigue importando a través de empresas, materias primas y sentimiento global.", "mistake": "Un error común es pensar que los movimientos de divisas solo importan a viajeros o exportadores.", "habit": "Cuando el dólar se mueve con fuerza, pregunta qué posiciones o sectores se benefician y cuáles salen perjudicados."}}}, {"id": "newsmoves", "level": "foundation", "cat": "newsDecoder", "diff": "beginnerLevel", "emoji": "📰", "title": {"en": "How news moves markets", "zh": "新闻是怎么推动市场的？", "es": "Cómo las noticias mueven los mercados"}, "plain": {"en": "markets react when news changes expectations, not just when something happens", "zh": "当新闻改变预期时，市场才会反应，而不只是“发生了事情”", "es": "los mercados reaccionan cuando una noticia cambia expectativas, no solo cuando ocurre algo"}, "content": {"en": {"what": "Markets move when news changes what investors expect about growth, inflation, earnings, rates, or risk.", "why": "Investors care because the same headline can have different effects depending on positioning and expectations.", "example": "A company can announce strong results, but if investors were expecting even stronger ones, the stock may still fall.", "portfolio": "The key question is not whether the headline sounds big, but whether it truly changes the outlook for what you own.", "mistake": "A common mistake is reacting to every headline before checking whether you have real exposure.", "habit": "Translate the headline into three questions: what changed, who is affected, and do I own it?"}, "zh": {"what": "当新闻改变了投资者对增长、通胀、盈利、利率或风险的预期时，市场就会波动。", "why": "投资者重视这一点，因为同一个标题在不同预期和仓位背景下，影响可能完全不同。", "example": "一家公司公布很强的业绩，但如果市场原本期待更强，股价依然可能下跌。", "portfolio": "关键不在于标题听起来有多大，而在于它是否真的改变了你所持资产的前景。", "mistake": "常见错误是还没确认自己是否有相关敞口，就对每条新闻做出反应。", "habit": "把每条新闻翻译成三个问题：变了什么、谁受影响、我是否持有？"}, "es": {"what": "Los mercados se mueven cuando una noticia cambia lo que los inversores esperan sobre crecimiento, inflación, ganancias, tasas o riesgo.", "why": "Importa porque un mismo titular puede tener efectos distintos según el posicionamiento y las expectativas previas.", "example": "Una empresa puede anunciar resultados fuertes, pero si el mercado esperaba algo aún mejor, la acción puede caer.", "portfolio": "La pregunta clave no es si el titular suena grande, sino si realmente cambia la perspectiva de lo que posees.", "mistake": "Un error común es reaccionar a cada titular antes de comprobar si realmente tienes exposición.", "habit": "Traduce cada titular en tres preguntas: ¿qué cambió, a quién afecta y yo lo tengo?"}}}, {"id": "volatility", "level": "builder", "cat": "portfolioSkills", "diff": "intermediateLevel", "emoji": "🌊", "title": {"en": "What is volatility?", "zh": "什么是波动率？", "es": "¿Qué es la volatilidad?"}, "plain": {"en": "how much and how quickly prices move up and down", "zh": "价格上下波动的幅度和速度", "es": "cuánto y qué tan rápido suben y bajan los precios"}, "content": {"en": {"what": "Volatility is the size and speed of price movements. Higher volatility means bigger swings.", "why": "Investors care because volatility affects emotions, risk management, and how large a position should be.", "example": "A 2% daily move may be normal for crypto but unusual for a diversified bond fund.", "portfolio": "High-volatility assets may deserve smaller position sizes even if you like the long-term story.", "mistake": "A common mistake is confusing volatility with permanent loss. They are related, but not the same.", "habit": "Use volatility to size positions and set expectations, not just to label something “good” or “bad.”"}, "zh": {"what": "波动率就是价格波动的幅度和速度；波动率越高，价格起伏通常越大。", "why": "投资者关心波动率，因为它会影响情绪、风险管理以及仓位大小。", "example": "对加密资产来说，单日波动 2% 可能很常见；但对分散化债券基金来说，这就很不寻常。", "portfolio": "即使你长期看好某个资产，如果波动很大，也可能更适合配更小的仓位。", "mistake": "常见错误是把波动率和永久性亏损混为一谈；两者相关，但并不相同。", "habit": "用波动率来决定仓位和预期，而不是简单把它贴上“好”或“坏”的标签。"}, "es": {"what": "La volatilidad es el tamaño y la velocidad de los movimientos de precios. Más volatilidad significa oscilaciones mayores.", "why": "Importa porque afecta emociones, gestión del riesgo y el tamaño adecuado de una posición.", "example": "Un movimiento diario del 2% puede ser normal para cripto, pero inusual para un fondo de bonos diversificado.", "portfolio": "Los activos de alta volatilidad pueden merecer tamaños de posición más pequeños aunque te guste su historia a largo plazo.", "mistake": "Un error común es confundir volatilidad con pérdida permanente. Están relacionadas, pero no son lo mismo.", "habit": "Usa la volatilidad para dimensionar posiciones y ajustar expectativas, no solo para decir si algo es “bueno” o “malo”."}}}, {"id": "beta", "level": "strategist", "cat": "portfolioSkills", "diff": "advancedLevel", "emoji": "β", "title": {"en": "What is beta?", "zh": "什么是 Beta？", "es": "¿Qué es beta?"}, "plain": {"en": "a measure of how sensitive a stock is to moves in the broader market", "zh": "衡量一只股票对大盘波动敏感度的指标", "es": "una medida de cuán sensible es una acción a los movimientos del mercado"}, "content": {"en": {"what": "Beta measures how much a stock tends to move relative to the overall market.", "why": "Investors care because beta can help explain whether a holding tends to be more defensive or more aggressive than the market.", "example": "A high-beta stock may rise more than the market in a rally, but it can also fall more in a selloff.", "portfolio": "Knowing your portfolio’s beta helps you understand how sensitive it may be to broad market swings.", "mistake": "A common mistake is treating beta as a full measure of risk. It is only one dimension.", "habit": "Use beta as context alongside valuation, business quality, and concentration risk."}, "zh": {"what": "Beta 用来衡量一只股票相对于整个市场通常会有多大波动。", "why": "投资者关心 Beta，因为它有助于判断一项持仓相对于大盘更偏防御还是更偏进攻。", "example": "高 Beta 股票在上涨行情中可能比大盘涨得更多，但在下跌时也往往跌得更快。", "portfolio": "了解组合的 Beta，能帮助你判断自己对大盘整体波动有多敏感。", "mistake": "常见错误是把 Beta 当成完整的风险衡量；它只是一种维度。", "habit": "把 Beta 当作辅助信息，并结合估值、业务质量和集中风险一起看。"}, "es": {"what": "Beta mide cuánto tiende a moverse una acción en relación con el mercado en general.", "why": "Importa porque ayuda a entender si una posición suele ser más defensiva o más agresiva que el mercado.", "example": "Una acción de beta alta puede subir más que el mercado en un rally, pero también caer más en una venta masiva.", "portfolio": "Conocer la beta de tu cartera te ayuda a entender qué tan sensible puede ser a los movimientos generales del mercado.", "mistake": "Un error común es tratar beta como una medida completa del riesgo. Es solo una dimensión.", "habit": "Usa beta como contexto junto con valoración, calidad del negocio y riesgo de concentración."}}}, {"id": "dca", "level": "foundation", "cat": "portfolioSkills", "diff": "beginnerLevel", "emoji": "⏳", "title": {"en": "Dollar-cost averaging", "zh": "什么是定投？", "es": "Promedio de costo en dólares"}, "plain": {"en": "investing a fixed amount on a regular schedule", "zh": "按固定周期投入固定金额", "es": "invertir una cantidad fija con regularidad"}, "content": {"en": {"what": "Dollar-cost averaging means investing the same amount of money on a regular schedule regardless of short-term price moves.", "why": "Investors care because it can reduce the pressure of trying to perfectly time the market.", "example": "If you invest monthly into a broad ETF, you naturally buy fewer shares when prices are high and more when prices are low.", "portfolio": "DCA is often useful for long-term investors building exposure gradually from cash flow.", "mistake": "A common mistake is assuming DCA eliminates risk. It mainly changes how you enter, not what you own.", "habit": "Pair DCA with a sensible asset choice and a time horizon long enough for the strategy to matter."}, "zh": {"what": "定投就是不管短期价格怎么波动，都按固定周期投入固定金额。", "why": "投资者关心定投，因为它能减轻“必须完美择时”的心理压力。", "example": "如果你每月定投宽基 ETF，价格高时自然会买得少一些，价格低时则会买得多一些。", "portfolio": "对长期投资者来说，定投尤其适合利用稳定现金流逐步建立仓位。", "mistake": "常见错误是以为定投能消除风险；它主要改变的是买入方式，而不是资产本身的风险。", "habit": "定投要和合适的资产选择以及足够长的时间周期搭配，效果才更明显。"}, "es": {"what": "Dollar-cost averaging significa invertir la misma cantidad de dinero de forma regular sin importar los movimientos de precio a corto plazo.", "why": "Importa porque puede reducir la presión de intentar acertar el momento perfecto del mercado.", "example": "Si inviertes mensualmente en un ETF amplio, comprarás menos participaciones cuando el precio esté alto y más cuando esté bajo.", "portfolio": "El DCA suele ser útil para inversores de largo plazo que construyen exposición poco a poco con su flujo de caja.", "mistake": "Un error común es pensar que el DCA elimina el riesgo. Cambia sobre todo cómo entras, no lo que posees.", "habit": "Combina el DCA con una selección de activos razonable y un horizonte suficientemente largo para que la estrategia tenga sentido."}}}, {"id": "splits", "level": "foundation", "cat": "marketBasics", "diff": "beginnerLevel", "emoji": "✂️", "title": {"en": "Stock splits", "zh": "什么是拆股？", "es": "Splits de acciones"}, "plain": {"en": "a company increases share count while lowering the price per share proportionally", "zh": "公司增加股数，同时按比例降低每股价格", "es": "una empresa aumenta el número de acciones y reduce proporcionalmente el precio por acción"}, "content": {"en": {"what": "A stock split increases the number of shares outstanding while reducing the price per share by the same proportion.", "why": "Investors care because splits can affect trading psychology and accessibility, even though they do not directly change business value.", "example": "In a 2-for-1 split, one share becomes two shares, but the total value of your position stays the same immediately after the split.", "portfolio": "A split may make a stock feel cheaper, but it does not automatically mean it is a better investment.", "mistake": "A common mistake is buying only because the nominal share price looks lower after a split.", "habit": "Focus on the business and valuation first; treat the split as a cosmetic change unless it alters liquidity meaningfully."}, "zh": {"what": "拆股会增加流通股数量，同时按同样比例降低每股价格。", "why": "投资者关注拆股，因为它会影响交易心理和可参与性，虽然它并不会直接改变企业价值。", "example": "例如 1 拆 2，原来一股变两股，但拆股刚完成时，你持仓的总价值并不会变化。", "portfolio": "拆股后股价看起来更便宜，但这并不自动意味着它更值得投资。", "mistake": "常见错误是因为拆股后“单价变低了”，就觉得更划算。", "habit": "先看业务和估值，把拆股视为一种表面变化，除非它确实显著改变了流动性。"}, "es": {"what": "Un split aumenta el número de acciones en circulación y reduce en la misma proporción el precio por acción.", "why": "Importa porque los splits pueden afectar la psicología del mercado y la accesibilidad, aunque no cambian directamente el valor del negocio.", "example": "En un split 2 por 1, una acción pasa a ser dos, pero el valor total de tu posición permanece igual justo después del split.", "portfolio": "Un split puede hacer que una acción parezca más barata, pero eso no significa automáticamente que sea mejor inversión.", "mistake": "Un error común es comprar solo porque el precio nominal por acción parece más bajo tras el split.", "habit": "Concéntrate primero en el negocio y la valoración; trata el split como un cambio cosmético salvo que altere la liquidez de forma relevante."}}}, {"id": "ratings", "level": "advanced", "cat": "investorTools", "diff": "advancedLevel", "emoji": "⭐", "title": {"en": "Analyst ratings", "zh": "分析师评级怎么看？", "es": "Calificaciones de analistas"}, "plain": {"en": "Wall Street opinions such as buy, hold, or sell on a stock", "zh": "华尔街对股票给出的买入、持有或卖出意见", "es": "opiniones de Wall Street como comprar, mantener o vender una acción"}, "content": {"en": {"what": "Analyst ratings are opinions from research analysts about whether a stock looks attractive, fairly valued, or weak.", "why": "Investors care because ratings can move sentiment and sometimes influence short-term price action.", "example": "A price-target increase may boost enthusiasm, but the stock can still fall if expectations were already too high.", "portfolio": "Ratings are most useful as one more input, not as a substitute for understanding what you own.", "mistake": "A common mistake is copying a rating without understanding the analyst’s assumptions or time horizon.", "habit": "Use ratings to gather perspectives, then compare them with your own portfolio exposure and goals."}, "zh": {"what": "分析师评级，是研究员对一只股票是否值得买、估值是否合理、或前景是否偏弱给出的意见。", "why": "投资者关心分析师评级，因为它会影响市场情绪，有时也会影响短期股价。", "example": "上调目标价可能提振情绪，但如果市场原本预期就过高，股价仍可能下跌。", "portfolio": "评级最适合当成一个补充信息，而不是取代你自己理解持仓的能力。", "mistake": "常见错误是直接照抄评级，却不了解分析师的假设和时间周期。", "habit": "把评级当成收集观点的工具，再拿它和自己的组合敞口与目标做对比。"}, "es": {"what": "Las calificaciones de analistas son opiniones de expertos sobre si una acción parece atractiva, razonable o débil.", "why": "Importa porque las calificaciones pueden mover el sentimiento y, a veces, la acción del precio a corto plazo.", "example": "Una subida de precio objetivo puede impulsar el entusiasmo, pero la acción aún puede caer si las expectativas ya eran demasiado altas.", "portfolio": "Las calificaciones son más útiles como un insumo adicional, no como sustituto de entender lo que posees.", "mistake": "Un error común es copiar una recomendación sin entender los supuestos ni el horizonte del analista.", "habit": "Usa las calificaciones para reunir perspectivas y luego compáralas con tu exposición y tus objetivos."}}}];

function trendSampleFromEvent(ev,host){const box=host.getBoundingClientRect();const pct=Math.max(0,Math.min(1,(ev.clientX-box.left)/box.width));const data=trendPointData();const idx=Math.round(pct*(data.growth.length-1));const g=data.growth[idx];const min=Math.min(...data.growth)-.8,max=Math.max(...data.growth)+.8;const x=(idx/(data.growth.length-1))*100;const y=84-((g-min)/(max-min))*62;return{label:data.labels[idx],growth:g,x,y}}
